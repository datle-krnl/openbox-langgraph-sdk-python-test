name: PR Security

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: pr-security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: "8.30.0"

jobs:
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    outputs:
      scan_failed: ${{ steps.trivy_result.outputs.scan_failed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          cache: true
          version: v0.69.2


      - name: Run Trivy filesystem scan for console output
        id: trivy_fs_console
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          trivy fs . \
            --scanners vuln,misconfig \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --include-dev-deps \
            --format table \
            --exit-code 1

      - name: Run Trivy filesystem scan for SARIF
        id: trivy_fs_sarif
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          trivy fs . \
            --scanners vuln,misconfig \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --include-dev-deps \
            --format sarif \
            --output trivy-fs-results.sarif \
            --exit-code 1

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      - name: Upload Trivy SARIF artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-results
          path: trivy-fs-results.sarif
          if-no-files-found: warn

      - name: Record Trivy scan result
        id: trivy_result
        if: ${{ always() }}
        shell: bash
        run: |
          scan_failed=false

          if [ "${{ steps.trivy_fs_console.outcome }}" = "failure" ] || [ "${{ steps.trivy_fs_sarif.outcome }}" = "failure" ]; then
            echo "Trivy scan reported findings or encountered an error."
            scan_failed=true
          fi

          echo "scan_failed=${scan_failed}" >> "$GITHUB_OUTPUT"

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    outputs:
      scan_failed: ${{ steps.gitleaks_result.outputs.scan_failed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" -o "${archive}"
          tar -xzf "${archive}" gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks SARIF scan
        id: gitleaks_scan
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-results.sarif \
            --redact

      - name: Upload Gitleaks SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

      - name: Upload Gitleaks SARIF artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: gitleaks-results.sarif
          if-no-files-found: warn

      - name: Record Gitleaks scan result
        id: gitleaks_result
        if: ${{ always() }}
        shell: bash
        run: |
          scan_failed=false

          if [ "${{ steps.gitleaks_scan.outcome }}" = "failure" ]; then
            echo "Gitleaks reported findings or encountered an error."
            scan_failed=true
          fi

          echo "scan_failed=${scan_failed}" >> "$GITHUB_OUTPUT"

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - trivy-fs
      - gitleaks
    if: ${{ always() }}

    steps:
      - name: Fail if any security scan failed
        shell: bash
        run: |
          failed=false

          if [ "${{ needs.trivy-fs.result }}" != "success" ] || [ "${{ needs.trivy-fs.outputs.scan_failed }}" = "true" ]; then
            echo "Trivy filesystem scan failed."
            failed=true
          fi

          if [ "${{ needs.gitleaks.result }}" != "success" ] || [ "${{ needs.gitleaks.outputs.scan_failed }}" = "true" ]; then
            echo "Gitleaks scan failed."
            failed=true
          fi

          if [ "$failed" = true ]; then
            exit 1
          fi
