name: PR Quality

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write 

concurrency:
  group: pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  COVERAGE_THRESHOLD: "80"
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests with coverage
        id: unit_tests
        continue-on-error: true
        run: |
          uv run python -m pytest tests/ \
            --cov=openbox_langgraph \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=${COVERAGE_THRESHOLD} \
            -v

      - name: Upload coverage report
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: ${{ always() && env.CODECOV_TOKEN != '' && hashFiles('coverage.xml') != '' }}
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          name: pr-quality
          fail_ci_if_error: false
          verbose: true
          token: ${{ env.CODECOV_TOKEN }}

      - name: Fail job if tests failed
        if: ${{ always() }}
        shell: bash
        run: |
          if [ "${{ steps.unit_tests.outcome }}" = "failure" ]; then
            echo "Unit tests or coverage threshold failed."
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          if-no-files-found: error

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs:
      - test

    steps:
      - name: Skip when SonarQube secrets are not configured
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' }}
        run: echo "Skipping SonarQube because SONAR_TOKEN or SONAR_HOST_URL is not configured."

      - name: Checkout repository
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
          path: .

      - name: Run Trivy SARIF scan for SonarQube import
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        id: sonarqube_trivy_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          vuln-type: os,library
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-sonar-results.sarif
          exit-code: "1"
          limit-severities-for-sarif: true

      - name: Install Gitleaks for SonarQube import
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_8.30.0_linux_x64.tar.gz"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/${archive}" -o "${archive}"
          tar -xzf "${archive}" gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks SARIF scan for SonarQube import
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        id: sonarqube_gitleaks_scan
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-sonar-results.sarif \
            --redact
 
      - name: Set up Java
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache SonarQube packages
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        id: sonarqube_scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.sarifReportPaths=trivy-sonar-results.sarif,gitleaks-sonar-results.sarif

      - name: Fail job if SonarQube scans failed
        if: ${{ always() && env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        shell: bash
        run: |
          failed=false

          if [ "${{ steps.sonarqube_trivy_scan.outcome }}" = "failure" ]; then
            echo "Trivy SonarQube import scan failed."
            failed=true
          fi

          if [ "${{ steps.sonarqube_gitleaks_scan.outcome }}" = "failure" ]; then
            echo "Gitleaks SonarQube import scan failed."
            failed=true
          fi

          if [ "${{ steps.sonarqube_scan.outcome }}" = "failure" ]; then
            echo "SonarQube scan failed."
            failed=true
          fi

          if [ "$failed" = true ]; then
            exit 1
          fi
