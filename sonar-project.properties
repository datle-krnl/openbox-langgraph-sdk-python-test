sonar.projectKey=openbox-langgraph-sdk-python
sonar.projectName=openbox-langgraph-sdk-python
sonar.sources=openbox_langgraph
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py
sonar.sourceEncoding=UTF-8

# Python configuration
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# Exclude non-source directories and generated artifacts from analysis.
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/*.pyo,**/.venv/**,**/venv/**,**/env/**,**/.env/**,**/.pytest_cache/**,**/.mypy_cache/**,**/.ruff_cache/**,**/dist/**,**/build/**,**/*.egg-info/**,docs/**,test-agent/**
